appId: com.t1doo.app
productName: T1doo
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md,plan.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!{.github,tests}'
asarUnpack:
  - resources/**
win:
  executableName: T1doo
  target:
    - nsis
    - zip
  artifactName: T1doo-${version}-win-${arch}-portable.${ext}
nsis:
  artifactName: T1doo-Setup-${version}.${ext}
  shortcutName: T1doo
  uninstallDisplayName: T1doo
  createDesktopShortcut: always
  # 2026-07-07 用户反馈：一键模式不能选安装目录 → 改向导式安装
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
npmRebuild: false
# 自动更新源（M6 §13）：仅从固定 GitHub Releases 拉取；draft Release 人工发布
publish:
  provider: github
  owner: T1doo
  repo: T1doo
